[workspace]
authors = ["Neppel Elian <elian.neppel@posteo.eu>"]
channels = ["conda-forge"]
name = "go2-mujoco-artefacts"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
sim = "python -m go2_mujoco_artefacts.injected_sport_go2_sim"

[dependencies]
mujoco = ">=3.6.0,<4"
python = ">=3.13.12,<3.14"
pytest = ">=9.0.2,<10"
numpy = ">=2.4.2,<3"
opencv = ">=4.13.0,<5"
pygame = ">=2.6.1,<3"
mediapy = ">=1.2.6,<2"
setuptools = ">=82.0.1,<83"
black = "*"
pyright = "*"
isort = "*"
rerun-sdk = ">=0.30.2,<0.31"
av = ">=17.0.0,<18"
pillow = ">=12.1.1,<13"
assimp = ">=6.0.4,<7"

[pypi-dependencies]
artefacts-cli = ">=0.15.0, <0.16"
cyclonedds-nightly = ">=2026.3.5, <2027"
go2_mujoco_artefacts = {path=".", editable=true}
unitree_sdk2py = {path="/home/elian/debug/go2-mujoco-artefacts/src/unitree_sdk2_python", editable=false}
asyncio-for-robotics = ">=1.3.5, <2"

[environments]
default = ["cpu"]
gpu = ["gpu"]

[feature.gpu.system-requirements]
cuda = "13.0" # change this depending on your nvidia-smi

[feature.gpu.dependencies]
pytorch-gpu = ">=2.10.0,<3"

[feature.cpu.dependencies]
pytorch-cpu = ">=2.10.0,<3"

[activation.env]
CYCLONEDDS_URI="./dds_config.xml"
